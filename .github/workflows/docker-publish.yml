name: Build and Publish Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent builds from the same branch
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize registry owner
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute ironclaw metadata
        id: meta_ironclaw
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/ironclaw
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=long,prefix=sha-

      - name: Build and push ironclaw
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-staging
          provenance: false
          push: true
          tags: ${{ steps.meta_ironclaw.outputs.tags }}
          labels: ${{ steps.meta_ironclaw.outputs.labels }}
          cache-from: type=gha,scope=ironclaw-main
          cache-to: type=gha,mode=max,scope=ironclaw-main

      - name: Compute ironclaw-worker metadata
        id: meta_worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/ironclaw-worker
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=long,prefix=sha-

      - name: Build and push ironclaw-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          provenance: false
          push: true
          tags: ${{ steps.meta_worker.outputs.tags }}
          labels: ${{ steps.meta_worker.outputs.labels }}
          cache-from: type=gha,scope=ironclaw-worker
          cache-to: type=gha,mode=max,scope=ironclaw-worker
