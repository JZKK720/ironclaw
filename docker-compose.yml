# Local development only — do NOT use these credentials in production.
services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ironclaw
      POSTGRES_USER: ironclaw
      POSTGRES_PASSWORD: ironclaw  # dev-only, change for any non-local deployment
    volumes:
      - pgdata_v025:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironclaw"]
      interval: 5s
      timeout: 3s
      retries: 5

  ironclaw:
    # Image is published to GHCR by GitHub Actions on every push to fork/main.
    # Watchtower polls this tag hourly and restarts the container when a new
    # digest is available — no manual docker pull or local rebuild needed.
    #
    # To force a local build instead (e.g., while developing patches):
    #   docker compose build ironclaw && docker compose up -d ironclaw
    image: ghcr.io/jzkk720/ironclaw:latest
    # Keep build config so `docker compose build` still works for local dev.
    build:
      context: .
      target: runtime-staging
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://ironclaw:ironclaw@postgres/ironclaw
      GATEWAY_HOST: 0.0.0.0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      ONBOARD_COMPLETED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Run as root so the process can access the Docker socket for sandbox sub-workers.
    # The image sets ENV HOME=/home/ironclaw, so the data directory is preserved.
    # This is a local-dev compose file; never run untrusted workloads with this setting.
    user: "0:0"
    command: ["run"]
    ports:
      - "127.0.0.1:3231:3000"
      - "127.0.0.1:8281:8080"
    volumes:
      # Mount the host Docker socket so ironclaw can spawn sandbox sub-worker containers.
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      # Tell Watchtower to watch this container for image updates.
      com.centurylinklabs.watchtower.enable: "true"

  # Build-only service: ensures `docker compose build` produces the ironclaw-worker image.
  # The ironclaw orchestrator spawns containers from this image on demand via the Docker API;
  # this service is never started by `docker compose up`.
  ironclaw-worker:
    image: ghcr.io/jzkk720/ironclaw-worker:latest
    build:
      context: .
      dockerfile: Dockerfile.worker
    profiles:
      - worker

  # Watchtower — polls GHCR hourly and hot-swaps ironclaw when a new image is pushed.
  # It only manages containers labelled com.centurylinklabs.watchtower.enable=true,
  # so other containers on this host are left untouched.
  #
  # Prerequisites (one-time setup):
  #   1. Create a GitHub PAT with read:packages scope at github.com/settings/tokens
  #   2. docker login ghcr.io -u jzkk720 -p <PAT>
  #      (credentials are stored by Docker and used automatically via the socket)
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Only manage containers that have the watchtower.enable label.
      WATCHTOWER_LABEL_ENABLE: "true"
      # Remove superseded image layers after each update.
      WATCHTOWER_CLEANUP: "true"
      # Poll interval in seconds (3600 = hourly).
      WATCHTOWER_POLL_INTERVAL: "3600"
      # Log at info level — visible via docker compose logs watchtower.
      WATCHTOWER_DEBUG: "false"

volumes:
  pgdata_v025:
