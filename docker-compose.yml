# Local development only — do NOT use these credentials in production.
services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ironclaw
      POSTGRES_USER: ironclaw
      POSTGRES_PASSWORD: ironclaw  # dev-only, change for any non-local deployment
    volumes:
      - pgdata_v025:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironclaw"]
      interval: 5s
      timeout: 3s
      retries: 5

  ironclaw:
    build:
      context: .
      target: runtime-staging
    image: ironclaw-ironclaw
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://ironclaw:ironclaw@postgres/ironclaw
      GATEWAY_HOST: 0.0.0.0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      ONBOARD_COMPLETED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Run as root so the process can access the Docker socket for sandbox sub-workers.
    # The image sets ENV HOME=/home/ironclaw, so the data directory is preserved.
    # This is a local-dev compose file; never run untrusted workloads with this setting.
    user: "0:0"
    command: ["run"]
    ports:
      - "127.0.0.1:3231:3000"
      - "127.0.0.1:8281:8080"
    volumes:
      # Mount the host Docker socket so ironclaw can spawn sandbox sub-worker containers.
      - /var/run/docker.sock:/var/run/docker.sock

  # Build-only service: ensures `docker compose build` produces the ironclaw-worker image.
  # The ironclaw orchestrator spawns containers from this image on demand via the Docker API;
  # this service is never started by `docker compose up`.
  ironclaw-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: ironclaw-worker:latest
    profiles:
      - worker

volumes:
  pgdata_v025:
